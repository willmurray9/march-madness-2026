seed: 42

ensemble:
  enabled_base_models:
    - logistic
    - hgb
    - xgb
    - catboost
    - elo
  blend_search_samples: 5000

base_models:
  logistic_regression:
    C: 0.5
    max_iter: 2000
  hist_gradient_boosting:
    learning_rate: 0.05
    max_depth: 6
    max_iter: 300
    min_samples_leaf: 20
  random_forest:
    n_estimators: 400
    min_samples_leaf: 2
  xgboost:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.03
    subsample: 0.85
    colsample_bytree: 0.85
    min_child_weight: 1.0
    reg_lambda: 1.0
  catboost:
    iterations: 700
    depth: 6
    learning_rate: 0.03
    l2_leaf_reg: 3.0
  elo:
    scale: 400.0

stacking:
  use_meta_model: true
  regularization_C: 0.5

calibration:
  candidates:
    - none
    - platt
    - isotonic
